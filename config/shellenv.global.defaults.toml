# shellenv global defaults template
# Copy to /etc/shellenv.toml (or SHELLENV_GLOBAL_CONFIG_PATH) and edit.

[shellenv]
# Where to clone/update the shellenv tool repository under the user's home (~ expanded)
# tool_repo_path = "~/.shellenv"

[compose]
# If true, allow off-main branches or non-main:HEAD; plain dirs outside any git worktree always scan
allow_dirty_or_off_main = "false"

# Compose sources: git URLs, local git repos, or plain directories; see PROJECT.md
paths = []

# Allowed kinds for each compose.paths entry: repo (URL or git worktree), directory (plain folder)
# allowed_path_kinds = [ "repo", "directory" ]

# RC file variants (e.g. zshrc, zshenv, zprofile)
shell_rc_files = []


[repo]
# Local path to clone repo into
# destination = null

# Git repo URL for shell init files
# url = null


[trace]
# Flag files taking longer than N% of total
# threshold_percent = null

# Flag files taking longer than N seconds
# threshold_secs = null
