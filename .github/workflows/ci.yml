name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          # Pin ruff to match [dependency-groups] dev in pyproject.toml
          pip install pytest pytest-cov "ruff==0.15.7"
      - name: Lint (ruff)
        run: |
          # check formatting and linting
          ruff format --check .
          ruff check .
      - name: Run tests
        env:
          ENVCONFIG_MOCK_TRACE_DIR: ${{ github.workspace }}/tests/fixtures/traces
        run: |
          PYTHONPATH=src pytest -q --cov=src --cov-report=term --cov-report=xml:coverage.xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
